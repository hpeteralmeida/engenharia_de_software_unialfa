<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">

        <div class=" tela ativa pagina-inicial">
            <h1>Teste seus conhecimentos</h1>

            <p>Vem fazer um quiz :)</p>

            <button class="Iniciar-quiz">Iniciar quiz</button>
        </div>

        <div class=" tela quiz-page">

            <h1 class="Pergunta">Colocar sua pergunta aqui</h1>

            <div class="Informacoes">
                <p>Questoes <span id="questao-atual"> 0 </span> de <span id="questoes-total"> 5 </span></p>

                <p> Pontos: <span id="pontos"> 0 </span></p>    
            </div>

            <div class="Respostas">
                     <!--As respostas vem aqui-->
            </div>

            <div class="barra-progresso">
                <div class="progresso"></div>
            </div>

            <button class="pula-quiz"> PULAR </button>
           
        </div>

        <div class=" tela resultados">
            <h1> Resultado </h1>

            <p> Pontuação final: <span> 0 </span> de <span> 5 </span></p>


        </div>
    </div>
</body>
</html>
