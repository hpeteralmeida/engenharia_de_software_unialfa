<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Insira os seus dados :)</h1>
    <form>
        <label for="nome"> Nome: </label>
        <input type="text" id="nome" placeholder="Digite seu nome:">

        <label for="email"> Email: </label>
        <input type="email" id="email" placeholder="example@example.com">

        <label for="cardNum"> Numero do cartao: </label>
        <input type="number" id="cardNum" placeholder="0000 0000 0000 0000">

        <label for="cpfNum"> CPF: </label>
        <input type="number" id="cpfNum" placeholder="000.000.000-00">  
    </form>

    <a href="../index.html">
        <button onclick="EnviaDados()"> Enviar </button>
    </a>
    
    <script>
        function EnviaDados() {
            // fazer a função que rouba dados
            alert("Dados enviados :)");
        }
    </script>
</body>
</html>
